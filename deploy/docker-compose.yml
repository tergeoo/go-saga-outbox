name: saga

x-postgres-common: &postgres-common
  image: postgres:16-alpine
  restart: unless-stopped
  environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
  command:
    - "postgres"
    - "-c"
    - "log_statement=all"
    - "-c"
    - "log_destination=stderr"
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 2s
    timeout: 3s
    retries: 20
  networks:
    - saga

services:
  postgres-orchestrator:
    <<: *postgres-common
    container_name: saga-pg-orchestrator
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchestrator
    ports:
      - "5439:5432"
    volumes:
      - pg_orchestrator:/var/lib/postgresql/data

  postgres-inventory:
    <<: *postgres-common
    container_name: saga-pg-inventory
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
    ports:
      - "5434:5432"
    volumes:
      - pg_inventory:/var/lib/postgresql/data

  postgres-payment:
    <<: *postgres-common
    container_name: saga-pg-payment
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment
    ports:
      - "5435:5432"
    volumes:
      - pg_payment:/var/lib/postgresql/data

  postgres-notification:
    <<: *postgres-common
    container_name: saga-pg-notification
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification
    ports:
      - "5436:5432"
    volumes:
      - pg_notification:/var/lib/postgresql/data

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: saga-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info -X brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      - redpanda:/var/lib/redpanda/data
    networks:
      - saga

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: saga-redpanda-console
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    networks:
      - saga

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: saga-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - saga

  grafana:
    image: grafana/grafana:11.2.0
    container_name: saga-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/go-saga-outbox.json
    volumes:
      - grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/go-saga-outbox.json:ro
    ports:
      - "3000:3000"
    networks:
      - saga

volumes:
  pg_orchestrator:
  pg_inventory:
  pg_payment:
  pg_notification:
  redpanda:
  prometheus:
  grafana:

networks:
  saga:
    driver: bridge
